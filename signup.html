<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .signup-card {
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="signup-card card shadow-sm p-4">
        <h4 class="mb-4 text-center">Sign Up</h4>
        <form id="signupForm">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" placeholder="Choose a username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Choose a password" required>
            </div>
            <div id="errorMsg" class="text-danger mb-3 d-none"></div>
            <div id="successMsg" class="text-success mb-3 d-none">Account created! <a href="login.html">Login here</a>.</div>
            <button type="submit" class="btn btn-outline-success w-100">Sign Up</button>
        </form>
        <p class="text-center mt-3 mb-0">Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="signup.js"></script>
</body>
</html>
