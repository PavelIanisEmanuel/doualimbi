<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">
<nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="index.html"><img src="logo.png" class="logo" alt="logo"></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="#" data-screen="home" onclick="navigate('home');return false;">Learn</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-screen="profile" onclick="navigate('profile');return false;">Profile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="login.html">Login</a>
                </li>
            </ul>
            <div class="d-flex gap-3 align-items-center">
                <span id="nav-streak" class="fw-bold small"></span>
                <span id="nav-gems" class="fw-bold small"></span>
                <span id="nav-xp" class="fw-bold small"></span>
            </div>
        </div>
    </div>
</nav>
    <div class="login-card card shadow-sm p-4">
        <h4 class="mb-4 text-center">Login</h4>
        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter password" required>
            </div>
            <div id="errorMsg" class="text-danger mb-3 d-none">Invalid username or password.</div>
            <button type="submit" class="btn btn-outline-success w-100">Login</button>
        </form>
        <p class="text-center mt-3 mb-0">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
